<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacked Breath Cycles</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #e8e4db;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script>
        // Palette
        const BG_COLOR = '#e8e4db';
        const PRIMARY_COLOR = '#1a1816';
        const SECONDARY_COLOR = '#2e2a26';
        const ACCENT_COLOR = '#b8b0a4';

        let strands = [];
        let terminals = [];
        let lastTime = 0;
        let lastCatchTime = 0;
        let currentPhase = 1;

        // Easing Functions
        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - pow(-2 * x + 2, 3) / 2;
        }
        function easeOutQuad(x) {
            return 1 - (1 - x) * (1 - x);
        }
        function easeInOutSine(x) {
            return -(cos(PI * x) - 1) / 2;
        }
        function easeOutElastic(x) {
            const c4 = (2 * PI) / 3;
            return x === 0 ? 0 : x === 1 ? 1 : pow(2, -10 * x) * sin((x * 10 - 0.75) * c4) + 1;
        }
        function easeOutQuart(x) {
            return 1 - pow(1 - x, 4);
        }

        class TerminalDot {
            constructor(parent, isTop) {
                this.parent = parent;
                this.isTop = isTop;
                this.baseR = random(6, 9); // Radius (diameter 12-18)
                this.nx = random(100);
                this.ny = random(100);
                this.sc = 1.0;
            }

            update(T) {
                this.nx += 0.001;
                this.ny += 0.0005;
                // Offset phase by 0.333 (0.7s / 2.1s) and invert parent phase relation
                let pPhase = ((T / 2100.0) + 0.333 - this.parent.phase) % 1.0;
                if (pPhase < 0) pPhase += 1.0;
                
                // easeInOutQuad-like pulsing using sine
                this.sc = lerp(1.0, 1.4, sin(pPhase * PI - PI/2) * 0.5 + 0.5);
            }

            display() {
                let px = this.parent.drawX;
                let py = this.parent.drawY + (this.isTop ? -1 : 1) * (this.parent.baseH / 2 * this.parent.scY);
                
                push();
                translate(px, py);
                scale(this.sc);
                fill(PRIMARY_COLOR);
                noStroke();
                
                beginShape();
                for (let i = 0; i < 24; i++) {
                    let a = (i / 24) * TWO_PI;
                    // Noise mapped -3 to +3
                    let d = noise(a * 3 + this.nx, this.ny) * 6 - 3;
                    let r = this.baseR + d;
                    vertex(cos(a) * r, sin(a) * r);
                }
                endShape(CLOSE);
                pop();
            }
        }

        class Strand {
            constructor(index, yRatio, period, phaseOffset) {
                this.index = index;
                this.yRatio = yRatio;
                this.basePeriod = period;
                this.phase = phaseOffset;
                this.baseW = random(180, 280);
                this.baseH = random(45, 65);
                
                this.nx = random(100);
                this.ny = random(100);
                
                this.scX = 1.0;
                this.scY = 1.0;
                this.drawX = 0;
                this.drawY = 0;
                
                this.catching = false;
                this.catchTimer = 0;
                this.strokeFade = 0;
                this.path = [];
            }

            startCatch() {
                this.catching = true;
                this.catchTimer = 0;
            }

            update(dT, T) {
                // Update position based on window resize
                let baseY = height * this.yRatio;
                this.drawX = width / 2;
                this.drawY = baseY;

                // Phase logic
                if (T < 12000) currentPhase = 1;
                else if (T < 35000) currentPhase = 2;
                else currentPhase = 3;

                // Determine current breathing period
                let currentPeriod = this.basePeriod;
                if (currentPhase === 2) {
                    let prog = (T - 12000) / 23000;
                    currentPeriod = lerp(this.basePeriod, 2.8, prog);
                } else if (currentPhase === 3) {
                    currentPeriod = 2.8;
                }

                // Advance breathing phase
                this.phase += (dT / 1000.0) / currentPeriod;
                this.phase %= 1.0;

                // Calculate Drift (Phase 2 & 3)
                let lateralOffset = 0;
                if (currentPhase >= 2) {
                    let driftPhase = (T / 18000.0) * TWO_PI;
                    if (this.index % 2 === 0) driftPhase += PI; // Invert for even
                    lateralOffset = sin(driftPhase) * 60;
                    
                    if (currentPhase === 3) {
                        // Return to center over 8s
                        let returnProg = min((T - 35000) / 8000.0, 1.0);
                        lateralOffset *= (1.0 - easeOutQuart(returnProg));
                        
                        // Vertical oscillation synchronized with breathing
                        this.drawY += sin(this.phase * TWO_PI) * 15;
                    }
                }
                this.drawX += lateralOffset;

                // Catch Event Logic or Normal Breathing
                if (this.catching) {
                    this.catchTimer += dT;
                    if (this.catchTimer < 800) { // Hold 48 frames
                        this.scX = 1.35; 
                        this.scY = 0.88;
                    } else if (this.catchTimer < 1000) { // Snap 12 frames
                        let t = (this.catchTimer - 800) / 200.0;
                        this.scX = lerp(1.35, 0.95, t);
                        this.scY = lerp(0.88, 1.0, t);
                    } else if (this.catchTimer < 1400) { // Rebound 24 frames
                        let t = (this.catchTimer - 1000) / 400.0;
                        this.scX = lerp(0.95, 1.0, easeOutElastic(t));
                        this.scY = 1.0;
                    } else {
                        this.catching = false;
                    }
                } else {
                    // Normal Breathing Modulations
                    if (this.phase < 0.525) { // Inhale
                        let t = this.phase / 0.525;
                        this.scX = lerp(1.0, 1.35, easeInOutCubic(t));
                        this.scY = lerp(1.0, 0.88, easeInOutCubic(t));
                    } else { // Exhale
                        let t = (this.phase - 0.525) / 0.475;
                        this.scX = lerp(1.35, 1.0, easeOutQuad(t));
                        this.scY = lerp(0.88, 1.0, easeOutQuad(t));
                    }
                }

                // Stroke Fade Logic
                if (this.scX > 1.2) {
                    this.strokeFade = min(this.strokeFade + 1.0 / 20.0, 1.0);
                } else {
                    this.strokeFade = max(this.strokeFade - 1.0 / 30.0, 0.0);
                }

                // Advance Noise
                this.nx += 0.002;
                this.ny += 0.001;

                this.generatePath();
            }

            getNoisyPoint(x, y) {
                let a = atan2(y, x);
                let d = noise(x * 0.015 + this.nx, y * 0.015 + this.ny) * 16 - 8;
                return { x: x + cos(a) * d, y: y + sin(a) * d };
            }

            generatePath() {
                this.path = [];
                let w = this.baseW, h = this.baseH;
                let k = 0.552284749831; // Bezier kappa for ellipse
                let ox = (w / 2) * k, oy = (h / 2) * k;

                // Define 4 bezier curves making up the ellipse, displacing all points
                // P0
                this.path.push(this.getNoisyPoint(w / 2, 0));
                // C1, C2, P1 (Bottom Right)
                this.path.push(this.getNoisyPoint(w / 2, oy));
                this.path.push(this.getNoisyPoint(ox, h / 2));
                this.path.push(this.getNoisyPoint(0, h / 2));
                // C3, C4, P2 (Bottom Left)
                this.path.push(this.getNoisyPoint(-ox, h / 2));
                this.path.push(this.getNoisyPoint(-w / 2, oy));
                this.path.push(this.getNoisyPoint(-w / 2, 0));
                // C5, C6, P3 (Top Left)
                this.path.push(this.getNoisyPoint(-w / 2, -oy));
                this.path.push(this.getNoisyPoint(-ox, -h / 2));
                this.path.push(this.getNoisyPoint(0, -h / 2));
                // C7, C8, P0 (Top Right)
                this.path.push(this.getNoisyPoint(ox, -h / 2));
                this.path.push(this.getNoisyPoint(w / 2, -oy));
                this.path.push(this.getNoisyPoint(w / 2, 0));
            }

            drawPath() {
                beginShape();
                vertex(this.path[0].x, this.path[0].y);
                bezierVertex(this.path[1].x, this.path[1].y, this.path[2].x, this.path[2].y, this.path[3].x, this.path[3].y);
                bezierVertex(this.path[4].x, this.path[4].y, this.path[5].x, this.path[5].y, this.path[6].x, this.path[6].y);
                bezierVertex(this.path[7].x, this.path[7].y, this.path[8].x, this.path[8].y, this.path[9].x, this.path[9].y);
                bezierVertex(this.path[10].x, this.path[10].y, this.path[11].x, this.path[11].y, this.path[12].x, this.path[12].y);
                endShape(CLOSE);
            }

            display() {
                push();
                translate(this.drawX, this.drawY);
                scale(this.scX, this.scY);

                // Depth Pass
                push();
                translate(0, 2);
                let pColor = color(PRIMARY_COLOR);
                pColor.setAlpha(38); // 15% opacity
                fill(pColor);
                noStroke();
                this.drawPath();
                pop();

                // Main Fill
                fill(PRIMARY_COLOR);
                noStroke();
                this.drawPath();

                // Stroke Overlay on Compression
                if (this.strokeFade > 0) {
                    let sColor = color(SECONDARY_COLOR);
                    sColor.setAlpha(this.strokeFade * 255);
                    stroke(sColor);
                    strokeWeight(2);
                    noFill();
                    this.drawPath();
                }

                pop();
            }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noiseDetail(3, 0.6);

            let spanH = height * 0.5;
            let spacingRatio = (spanH / 6) / height;
            let startYRatio = 0.25;

            // Initialize Strands
            for (let i = 0; i < 7; i++) {
                let yR = startYRatio + i * spacingRatio;
                let p = (i === 3) ? 5.0 : 4.2;
                let off = 0;
                if (i === 1 || i === 5) off = 0.286;
                if (i === 2 || i === 4) off = 0.571;
                strands.push(new Strand(i, yR, p, off));
            }

            // Initialize Terminals
            terminals.push(new TerminalDot(strands[0], true));
            terminals.push(new TerminalDot(strands[6], false));
        }

        function draw() {
            let T = millis();
            let dT = T - lastTime;
            lastTime = T;

            background(BG_COLOR);

            // Trigger Catch Event in Phase 3
            if (currentPhase === 3 && T - lastCatchTime > 12000) {
                let idx = floor(random(7));
                strands[idx].startCatch();
                lastCatchTime = T;
            }

            // Render Terminals (behind)
            for (let t of terminals) {
                t.update(T);
                t.display();
            }

            // Render Strands
            for (let s of strands) {
                s.update(dT, T);
                s.display();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
