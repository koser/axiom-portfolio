<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interval Drift</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            width: 100vw; 
            height: 100vh; 
        }
        canvas { 
            display: block; 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script>
        let stripes = [];
        let lastT = 0;
        let p1_weight = 1, p2_weight = 0, p3_weight = 0;

        let mX = 0, mY = 0;
        let lastMouseMoveT = 0;
        let targetDrift = 0, targetWidthAmp = 0;
        let currentDrift = 0, currentWidthAmp = 0;

        let waves = [];
        let lastAutoWaveT = 0;

        class Stripe {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                
                // Assign types based on ratios: 15 shadow, 31 primary, 4 accent (Total 50)
                if (index < 15) this.type = 'shadow';
                else if (index < 46) this.type = 'primary';
                else this.type = 'accent';

                this.baseWidth = random(8, 14);
                this.width = this.baseWidth;
                this.vx = 0;
                this.phase = random(TWO_PI);
                this.noiseOff = random(1000);

                this.resetStart = -9999;
                this.resetDur = 2000; // 120 frames at 60fps
                this.resetStartX = 0;
            }

            updateBaseX(w) {
                this.baseX = map(this.index, 0, this.total - 1, 0, w);
                if (this.x === undefined) this.x = this.baseX;
            }

            triggerReset(t) {
                if (t - this.resetStart > this.resetDur) {
                    this.resetStart = t;
                    this.resetStartX = this.x;
                }
            }

            update(t, dt) {
                let resetAge = t - this.resetStart;
                
                if (resetAge < this.resetDur) {
                    // Resetting state: easeOutCubic interpolation
                    let p = resetAge / this.resetDur;
                    let ease = 1 - Math.pow(1 - p, 3);
                    this.x = lerp(this.resetStartX, this.baseX, ease);
                    this.vx = 0;
                } else {
                    // Active dynamics state
                    let force = 0;

                    // Phase 1: Gentle drift
                    force += p1_weight * (sin(t * 0.0006 + this.phase) * 18 + noise(this.noiseOff + t * 0.00006) * 12);

                    // Phase 2: Chaotic clustering
                    let p2Force = sin(t * 0.0005 + this.phase) * 48;
                    if (this.index % 4 === 0) p2Force += 18; // Rightward clustering force
                    force += p2_weight * p2Force;

                    // Phase 3: Wave separation
                    let p3Force = 0;
                    if (this.x < width * 0.33) p3Force = 90;
                    else if (this.x > width * 0.67) p3Force = -90;
                    else p3Force = sin(t * 0.0012 + this.phase) * 48;
                    force += p3_weight * p3Force;

                    // Add interaction drift
                    force += currentDrift;

                    // Apply forces and physics
                    this.vx += force * dt;
                    this.vx *= Math.pow(0.05, dt); // Emulates vx *= 0.95 per frame at 60fps
                    this.x += this.vx * dt;

                    // Toroidal bounds constraint
                    if (this.x < -50) this.x += width + 100;
                    if (this.x > width + 50) this.x -= width + 100;
                }

                // Continuous width modulation logic
                let w1 = this.baseWidth + sin(t * 0.002 + this.phase) * 2;
                let w2 = this.baseWidth + sin(t * 0.0018 + this.phase) * 5;
                let w3 = this.baseWidth + sin(t * 0.0015 + this.phase) * (5 + currentWidthAmp);
                this.width = w1 * p1_weight + w2 * p2_weight + w3 * p3_weight;
            }

            draw() {
                if (this.type === 'accent') {
                    // Flash rarely for 1 frame (approx 1 per 90 frames / 1.5s)
                    if (random() < 0.011) {
                        stroke('#e8e8e8');
                        strokeWeight(this.width);
                        line(this.x, 0, this.x, height);
                    }
                } else {
                    stroke(this.type === 'primary' ? '#c4c4c4' : '#2d2d2d');
                    strokeWeight(this.width);
                    line(this.x, 0, this.x, height);
                }
            }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noiseSeed(888);
            
            for (let i = 0; i < 50; i++) {
                let s = new Stripe(i, 50);
                s.updateBaseX(width);
                stripes.push(s);
            }
        }

        function draw() {
            background('#1a1a1a');
            
            let t = millis();
            let dt = min((t - lastT) / 1000.0, 0.05); // Protect against lag spikes
            lastT = t;

            updatePhaseState(t);
            updateInteraction(t);
            processWaves(t);

            // Update all physics
            for (let i = 0; i < stripes.length; i++) {
                stripes[i].update(t, dt);
            }

            // Draw in strict z-order
            for (let i = 0; i < stripes.length; i++) {
                if (stripes[i].type === 'shadow') stripes[i].draw();
            }
            for (let i = 0; i < stripes.length; i++) {
                if (stripes[i].type === 'primary') stripes[i].draw();
            }
            for (let i = 0; i < stripes.length; i++) {
                if (stripes[i].type === 'accent') stripes[i].draw();
            }

            drawInteractionIndicator(t);
        }

        function updatePhaseState(t) {
            let cycleT = t % 90000;
            
            if (cycleT < 15000) { // Phase 1
                p1_weight = 1; p2_weight = 0; p3_weight = 0;
            } else if (cycleT < 20000) { // Transition 1 -> 2
                p1_weight = map(cycleT, 15000, 20000, 1, 0);
                p2_weight = map(cycleT, 15000, 20000, 0, 1);
                p3_weight = 0;
            } else if (cycleT < 40000) { // Phase 2
                p1_weight = 0; p2_weight = 1; p3_weight = 0;
            } else if (cycleT < 45000) { // Transition 2 -> 3
                p1_weight = 0;
                p2_weight = map(cycleT, 40000, 45000, 1, 0);
                p3_weight = map(cycleT, 40000, 45000, 0, 1);
            } else if (cycleT < 85000) { // Phase 3
                p1_weight = 0; p2_weight = 0; p3_weight = 1;
            } else { // Transition 3 -> 1
                p3_weight = map(cycleT, 85000, 90000, 1, 0);
                p1_weight = map(cycleT, 85000, 90000, 0, 1);
                p2_weight = 0;
            }
        }

        function updateInteraction(t) {
            let idleTime = t - lastMouseMoveT;
            
            if (idleTime < 5000) { // Active
                targetDrift = map(mX, 0, width, -30, 30); // +/- 30px per sec
                targetWidthAmp = map(mY, 0, height, 0, 10);
            } else { // Idle decay over time
                targetDrift = 0;
                targetWidthAmp = 0;
            }
            
            currentDrift = lerp(currentDrift, targetDrift, 0.05);
            currentWidthAmp = lerp(currentWidthAmp, targetWidthAmp, 0.05);
        }

        function processWaves(t) {
            // Phase 3 specific auto-resets
            if (p3_weight > 0.5 && t - lastAutoWaveT > 4000) {
                let numToReset = floor(random(5, 9));
                for(let i=0; i<numToReset; i++) {
                    let idx = floor(random(stripes.length));
                    stripes[idx].triggerReset(t);
                }
                lastAutoWaveT = t;
            }

            // Click-generated expansion waves
            for (let i = waves.length - 1; i >= 0; i--) {
                let w = waves[i];
                let age = t - w.startTime;
                
                if (age > 1500) { // 90 frames at 60fps
                    waves.splice(i, 1);
                } else {
                    let radius = 150 + (age / 1000) * 180; // Starts 150px, expands 180px/s
                    for (let s of stripes) {
                        if (abs(s.x - w.x) < radius) {
                            s.triggerReset(t);
                        }
                    }
                }
            }
        }

        function drawInteractionIndicator(t) {
            let alpha = map(t, 0, 4000, 180, 0, true);
            if (alpha <= 0) return;
            
            push();
            noStroke();
            fill(232, 232, 232, alpha);
            ellipse(width / 2, 20, 12, 12);
            fill(26, 26, 26, alpha);
            ellipse(width / 2, 20, 6, 6);
            pop();
        }

        function mouseMoved() {
            mX = mouseX;
            mY = mouseY;
            lastMouseMoveT = millis();
        }

        function mousePressed() {
            waves.push({ x: mouseX, startTime: millis() });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            for (let s of stripes) {
                s.updateBaseX(width);
            }
        }
    </script>
</body>
</html>
