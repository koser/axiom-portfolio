<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interval Drift</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script>
        let stripes = [];
        let lastMx = 0, lastMy = 0, lastInteractTime = 0;
        let globalDrift = 0, globalWidthMod = 0;
        let lastFlipTime = 0;

        class Stripe {
            constructor(index, band, baseX, baseW, type) {
                this.index = index;
                this.band = band;
                this.baseX = baseX;
                this.x = baseX;
                this.baseW = baseW;
                this.w = baseW;
                this.type = type;
                this.phaseOffset = random(TWO_PI);
                this.noiseOffset = random(2000);
                this.segments = new Array(8).fill(0);
                this.dragOffsets = new Array(8).fill(0);
                this.angle = 0;
                this.dist = 0;
                this.angularVel = map(index, 0, 50, 0.012, 0.025);
                this.clickImpulse = 0;
                this.inP3 = false;
            }

            update(t, w1, w2, w3) {
                // --- X Position Logic ---
                let p1X = this.baseX;
                if (this.band === 0) p1X += sin(t * 0.008 + this.phaseOffset) * 15 + noise(this.noiseOffset + t * 0.002) * 8;
                else if (this.band === 1) p1X += sin(t * 0.015 + this.phaseOffset) * 6 + noise(this.noiseOffset + t * 0.003) * 4;
                else p1X += sin(t * 0.005 + this.phaseOffset) * 25 + noise(this.noiseOffset + t * 0.001) * 12;

                if (w1 > 0) {
                    this.x = lerp(this.x, p1X, w1 * 0.1);
                }

                if (w2 > 0) {
                    let vx = 0.8 + (this.index * 0.012);
                    this.x += vx * w2;
                    // Wrap around during drift
                    if (this.x > width + 50) this.x = -50;
                    if (this.x < -50) this.x = width + 50;
                }

                if (w3 > 0) {
                    if (!this.inP3) {
                        this.dist = abs(this.x - this.baseX);
                        this.angle = (this.x >= this.baseX) ? 0 : PI;
                        this.inP3 = true;
                    }
                    
                    let currentAngVel = this.angularVel + this.clickImpulse;
                    this.angle += currentAngVel * w3;
                    this.dist *= lerp(1, 0.988, w3);
                    
                    let p3X = this.baseX + cos(this.angle) * this.dist;
                    this.x = lerp(this.x, p3X, w3 * 0.2);
                } else {
                    this.inP3 = false;
                }

                // Decay click impulse and apply global mouse drift
                this.clickImpulse = lerp(this.clickImpulse, 0, 0.05);
                this.x += globalDrift;

                // --- Width Logic ---
                let p1W = this.baseW + sin(t * 0.02 + this.phaseOffset) * 3;
                let p2W = this.baseW + sin(t * 0.025 + this.phaseOffset) * 7 + cos(t * 0.012) * 4;
                let p3W = this.baseW + sin(t * 0.008 + this.phaseOffset) * 1.5;
                
                this.w = p1W * w1 + p2W * w2 + p3W * w3 + globalWidthMod;
                this.w = max(1, this.w);

                // --- Height Segment Offset Logic ---
                for (let i = 0; i < 8; i++) {
                    this.dragOffsets[i] *= 0.94; // Decay manual drag
                    let targetSeg = 0;
                    if (w2 > 0) {
                        targetSeg = sin(t * 0.018 + this.phaseOffset + i * 0.6) * 20 * w2;
                    }
                    this.segments[i] = lerp(this.segments[i], targetSeg, 0.1) + this.dragOffsets[i];
                }
            }

            display(t) {
                let segH = height / 8;
                
                // Set color based on type
                if (this.type === 'shad') fill(45, 45, 45); // #2d2d2d
                else if (this.type === 'prim') fill(196, 196, 196); // #c4c4c4
                else {
                    // Accent pulses opacity #e8e8e8
                    let alpha = map(sin(t * 0.031 + this.phaseOffset), -1, 1, 153, 255);
                    fill(232, 232, 232, alpha);
                }

                // Render vertical segments
                for (let i = 0; i < 8; i++) {
                    let y = i * segH + this.segments[i];
                    rect(this.x - this.w / 2, y, this.w, segH + 1); // +1 to prevent sub-pixel rendering gaps
                }
            }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noiseSeed(42);
            noStroke();

            // Distribute 50 stripes: 32 primary, 14 shadow, 4 accent
            let types = Array(32).fill('prim').concat(Array(14).fill('shad')).concat(Array(4).fill('acc'));
            for (let i = types.length - 1; i > 0; i--) {
                let j = floor(random(i + 1));
                [types[i], types[j]] = [types[j], types[i]];
            }

            let leftW = width * 0.3;
            let centerW = width * 0.4;
            let rightW = width * 0.3;

            for (let i = 0; i < 50; i++) {
                let band, baseX, baseW;
                if (i < 18) {
                    band = 0;
                    baseX = map(i, 0, 17, 10, leftW - 10);
                    baseW = random(12, 16);
                } else if (i < 38) {
                    band = 1;
                    baseX = leftW + map(i - 18, 0, 19, 10, centerW - 10);
                    baseW = random(6, 10);
                } else {
                    band = 2;
                    baseX = leftW + centerW + map(i - 38, 0, 11, 10, rightW - 10);
                    baseW = random(10, 14);
                }
                stripes.push(new Stripe(i, band, baseX, baseW, types[i]));
            }
        }

        function draw() {
            background(26, 26, 26); // #1a1a1a
            let ms = millis();
            let t = ms / 16.666; // Normalize to roughly 60fps frame count equivalent

            // --- Global Interaction & Idle Handling ---
            if (abs(mouseX - lastMx) > 1 || abs(mouseY - lastMy) > 1) {
                lastInteractTime = ms;
                lastMx = mouseX; 
                lastMy = mouseY;
            }

            if (ms - lastInteractTime > 4000) {
                globalDrift *= 0.97;
                globalWidthMod *= 0.97;
                if (abs(globalDrift) < 0.1) globalDrift = 0;
                if (abs(globalWidthMod) < 0.1) globalWidthMod = 0;
            } else {
                let targetDrift = map(mouseX, 0, width, -0.8, 0.8);
                let targetWMod = map(mouseY, 0, height, -5, 5);
                globalDrift = lerp(globalDrift, targetDrift, 0.1);
                globalWidthMod = lerp(globalWidthMod, targetWMod, 0.1);
            }

            // --- Phase State Calculation (120s cycle) ---
            let cycle = ms % 120000;
            let w1 = 0, w2 = 0, w3 = 0;
            
            if (cycle < 20000) w1 = 1; // P1
            else if (cycle < 24000) { w2 = (cycle - 20000) / 4000; w1 = 1 - w2; } // P1 -> P2
            else if (cycle < 55000) w2 = 1; // P2
            else if (cycle < 59000) { w3 = (cycle - 55000) / 4000; w2 = 1 - w3; } // P2 -> P3
            else if (cycle < 116000) w3 = 1; // P3
            else { w1 = (cycle - 116000) / 4000; w3 = 1 - w1; } // P3 -> P1

            // Smooth phase weights (easeInOut)
            w1 = w1 * w1 * (3 - 2 * w1);
            w2 = w2 * w2 * (3 - 2 * w2);
            w3 = w3 * w3 * (3 - 2 * w3);

            // --- Phase 3 Shockwaves ---
            if (w3 > 0.5 && ms - lastFlipTime > 6000) {
                lastFlipTime = ms;
                let count = floor(random(6, 11));
                for (let i = 0; i < count; i++) random(stripes).angle += PI;
            }

            // Update all stripes
            for (let s of stripes) s.update(t, w1, w2, w3);

            // Draw order: shadow (back), primary (mid), accent (front)
            for (let type of ['shad', 'prim', 'acc']) {
                for (let s of stripes) {
                    if (s.type === type) s.display(t);
                }
            }

            drawInteractionIndicator(ms);
        }

        function mousePressed() {
            let cx = width / 2;
            let cy = height / 2;
            let clickAngle = atan2(mouseY - cy, mouseX - cx);

            for (let s of stripes) {
                let d = dist(mouseX, mouseY, s.x, cy);
                let diff = abs(s.angle - clickAngle);
                if (diff > PI) diff = TWO_PI - diff; // Handle wrap around
                
                if (diff < PI / 4 && d < 400) {
                    s.clickImpulse += 0.08;
                }
            }
        }

        function mouseDragged() {
            if (abs(mouseX - pmouseX) > 2) {
                let closest = stripes[0];
                let minDist = abs(stripes[0].x - mouseX);
                
                for (let s of stripes) {
                    let d = abs(s.x - mouseX);
                    if (d < minDist) { 
                        minDist = d; 
                        closest = s; 
                    }
                }
                
                let dy = mouseY - pmouseY;
                for (let i = 0; i < 8; i++) {
                    closest.dragOffsets[i] += map(dy, -50, 50, -15, 15, true) * map(i, 0, 7, 1.0, 0.3);
                }
            }
        }

        function windowResized() {
            let oldW = width;
            resizeCanvas(windowWidth, windowHeight);
            let ratio = width / oldW;
            for (let s of stripes) {
                s.baseX *= ratio;
                s.x *= ratio;
            }
        }

        function drawInteractionIndicator(ms) {
            if (ms < 4000) {
                let alpha = map(ms, 0, 4000, 180, 0);
                push();
                noStroke();
                fill(232, 232, 232, alpha); // #e8e8e8
                ellipse(width / 2, 20, 12, 12);
                fill(26, 26, 26, alpha); // #1a1a1a
                ellipse(width / 2, 20, 4, 4);
                pop();
            }
        }
    </script>
</body>
</html>
