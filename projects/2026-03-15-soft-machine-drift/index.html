<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Machine Drift</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f4f1e8;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script>
        const PALETTE = ['#4a7c8e', '#d94e72', '#8b5a7d', '#c9a84e', '#e87451'];
        const SHADOW = '#2d5f3f';
        const BG = '#f4f1e8';

        let caps = [];
        let grans = [];
        let tex;
        let simTime = 0;
        let lastRealTime = 0;
        let timeDilation = 1.0;
        let vortexOffX = 0;
        let lastInteraction = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            generateTexture();
            initSystem();
            lastRealTime = millis();
        }

        function initSystem() {
            caps = [];
            grans = [];
            for (let i = 0; i < 28; i++) {
                caps.push(new Capsule(i));
            }
            for (let i = 0; i < 140; i++) {
                grans.push(new Granule());
            }
        }

        function generateTexture() {
            tex = createGraphics(windowWidth, windowHeight);
            tex.noStroke();
            tex.fill(0, 0, 0, 8);
            for (let i = 0; i < 4000; i++) {
                tex.ellipse(random(tex.width), random(tex.height), random(2, 8));
            }
        }

        function draw() {
            let now = millis();
            let dt = now - lastRealTime;
            lastRealTime = now;

            handleInteraction();

            simTime += dt * timeDilation;
            let simFrames = (dt * timeDilation) / 16.67;

            // Phase calculation (120s cycle)
            let cycle = simTime % 120000;
            let phase = cycle < 28000 ? 1 : (cycle < 72000 ? 2 : 3);
            let pProg = phase === 1 ? cycle / 28000 : (phase === 2 ? (cycle - 28000) / 44000 : (cycle - 72000) / 48000);

            // Restart trigger
            if (phase === 1 && pProg < 0.005 && caps[0] && caps[0].phase === 3) {
                initSystem();
            }

            background(BG);
            image(tex, 0, 0);

            // Z-sorting by phase roughly
            for (let c of caps) c.update(phase, pProg, simFrames);
            for (let c of caps) c.drawShadow();
            for (let c of caps) c.draw();
            
            for (let g of grans) {
                g.update(phase, simFrames);
                g.draw();
            }

            drawInteractionIndicator();
        }

        function handleInteraction() {
            let now = millis();
            let isPassive = (now - lastInteraction) > 1500;

            if (!isPassive) {
                timeDilation = lerp(timeDilation, map(mouseY, 0, height, 0.6, 1.8), 0.1);
                vortexOffX = lerp(vortexOffX, map(mouseX, 0, width, -180, 180), 0.1);
            } else {
                timeDilation = lerp(timeDilation, 1.0, 0.03);
                vortexOffX = lerp(vortexOffX, 0, 0.03);
            }

            if (mouseIsPressed && !isPassive) {
                for (let c of caps) {
                    let d = dist(mouseX, mouseY, c.p.x, c.p.y);
                    if (d < 280) {
                        let force = p5.Vector.sub(c.p, createVector(mouseX, mouseY))
                                    .normalize()
                                    .mult(2.1 * pow(1 - d / 280, 2) * timeDilation);
                        c.v.add(force);
                    }
                }
            }
        }

        function mouseMoved() { lastInteraction = millis(); }
        function mouseDragged() { lastInteraction = millis(); }
        function mousePressed() {
            lastInteraction = millis();
            for (let c of caps) {
                let d = dist(mouseX, mouseY, c.p.x, c.p.y);
                if (d < 400) {
                    let mag = 3.2 * (1 - d / 400);
                    let dir = createVector(c.p.y - mouseY, mouseX - c.p.x).normalize().mult(mag);
                    c.v.add(dir);
                }
            }
            // Spawn temporary granules
            for(let i=0; i<15; i++) {
                let g = new Granule();
                g.p = createVector(mouseX + random(-20,20), mouseY + random(-20,20));
                grans.push(g);
            }
            if(grans.length > 200) grans.splice(0, grans.length - 200);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            generateTexture();
        }

        function drawInteractionIndicator() {
            let mt = millis();
            if (mt < 4000) {
                let a = map(mt, 0, 4000, 180, 0);
                push();
                fill(74, 124, 142, a); // dusty teal
                noStroke();
                rectMode(CENTER);
                rect(width / 2, 20, 14, 20, 7);
                fill(244, 241, 232, a);
                rect(width / 2, 15, 4, 6, 2); // wheel
                pop();
            }
        }

        class Capsule {
            constructor(idx) {
                this.id = idx;
                this.spawnAngle = (idx % 8) * TWO_PI / 8;
                let cx = width / 2 + cos(this.spawnAngle) * 200;
                let cy = height / 2 + sin(this.spawnAngle) * 200;
                this.orbitAngle = random(TWO_PI);
                this.orbitDir = random() > 0.5 ? 1 : -1;
                this.p = createVector(cx + cos(this.orbitAngle) * 220, cy + sin(this.orbitAngle) * 220);
                this.v = createVector(0, 0);
                this.col = color(PALETTE[idx % PALETTE.length]);
                this.col.setAlpha(220);
                this.baseW = random(80, 180);
                this.baseH = random(40, 90);
                this.rot = random(TWO_PI);
                this.seed = random(1000);
                this.hist = [];
                this.phase = 1;
                this.hasSplit = false;
                this.sc = 0;
            }

            update(ph, prog, sFrames) {
                // Phase transitions
                if (ph !== this.phase) {
                    if (ph === 3) {
                        let dir = p5.Vector.sub(this.p, createVector(width / 2, height / 2)).normalize();
                        this.v = dir.mult(5.8);
                    }
                    this.phase = ph;
                }

                // Entrance scaling
                if (ph === 1 && prog < 0.05) {
                    let ease = 1 - pow(1 - (prog / 0.05), 3);
                    this.sc = map(ease, 0, 1, 0.2, 1.0);
                } else {
                    // Organic breathing pulse
                    this.sc = 1.0 + (noise(this.id * 10, simTime * 0.0005) - 0.5) * 0.24;
                }

                if (ph === 1) {
                    let cx = width / 2 + cos(this.spawnAngle) * 200;
                    let cy = height / 2 + sin(this.spawnAngle) * 200;
                    this.orbitAngle += 0.008 * this.orbitDir * sFrames;
                    let tx = cx + cos(this.orbitAngle) * 220;
                    let ty = cy + sin(this.orbitAngle) * 220;
                    this.p.lerp(createVector(tx, ty), 0.08 * sFrames);
                    this.rot += random(0.006, 0.011) * sFrames;

                } else if (ph === 2) {
                    let cx = width / 2 + vortexOffX;
                    let cy = height / 2;
                    let d = dist(this.p.x, this.p.y, cx, cy);
                    let a = atan2(this.p.y - cy, this.p.x - cx);
                    
                    let aVel = map(prog, 0, 1, 0.01, 0.028);
                    a += aVel * sFrames;
                    d = lerp(d, max(20, d - 0.8 * sFrames), 0.1);
                    
                    this.p.lerp(createVector(cx + cos(a) * d, cy + sin(a) * d), 0.15 * sFrames);
                    
                    // Rotation oscillation
                    this.rot += (0.021 * sin(simTime * 0.0005 + this.id)) * sFrames;
                    
                    // Weaving logic
                    if (prog > 0.2) {
                        this.p.x += sin(simTime * 0.002 + this.id) * 2 * sFrames;
                        this.p.y += cos(simTime * 0.0025 + this.id) * 2 * sFrames;
                        // Squash/stretch approximation via scale mod
                        this.sc *= 1.0 + sin(simTime * 0.004 + this.id) * 0.12;
                    }

                } else if (ph === 3) {
                    this.p.add(p5.Vector.mult(this.v, sFrames));
                    this.v.mult(pow(0.985, sFrames));
                    this.rot += (0.003 + sin(simTime * 0.005) * 0.02) * sFrames;

                    // Cascading Splits
                    let dC = dist(this.p.x, this.p.y, width / 2, height / 2);
                    if (dC < 160 && !this.hasSplit && caps.length < 50 && random() < 0.06) {
                        this.hasSplit = true;
                        this.baseW *= 0.7; this.baseH *= 0.7;
                        
                        let child = new Capsule(this.id + 100);
                        let perp = createVector(-this.v.y, this.v.x).normalize().mult(30);
                        child.p = this.p.copy().add(perp);
                        child.v = this.v.copy().rotate(0.4).mult(1.1);
                        child.baseW = this.baseW; child.baseH = this.baseH;
                        child.phase = 3; child.hasSplit = true;
                        child.sc = 0.7;
                        caps.push(child);
                        
                        this.p.sub(perp); // push parent opposite way
                        this.v.rotate(-0.4);
                    }
                }

                // Global bounds & drag
                this.p.add(p5.Vector.mult(this.v, sFrames));
                this.v.mult(pow(0.95, sFrames)); // intrinsic friction

                if (frameCount % 3 === 0) {
                    this.hist.push(this.p.copy());
                    if (this.hist.length > (ph === 3 ? 18 : 10)) this.hist.shift();
                }
            }

            drawShape(c, xOff = 0, yOff = 0, isShadow = false) {
                push();
                translate(this.p.x + xOff, this.p.y + yOff);
                rotate(this.rot);
                scale(this.sc);
                fill(c);
                noStroke();
                beginShape();
                let pts = 36;
                let hw = this.baseW / 2, hh = this.baseH / 2;
                let sw = max(0, this.baseW - this.baseH);
                let tOff = simTime * 0.0015;
                
                for (let i = 0; i < pts; i++) {
                    let a = map(i, 0, pts, 0, TWO_PI);
                    let bx, by;
                    // Parametric capsule boundary
                    if (a < HALF_PI || a > 3 * HALF_PI) {
                        bx = sw / 2 + cos(a) * hh; by = sin(a) * hh;
                    } else {
                        bx = -sw / 2 + cos(a) * hh; by = sin(a) * hh;
                    }
                    
                    let n = noise(bx * 0.08 + this.seed, by * 0.08, tOff);
                    let disp = map(n, 0, 1, -12, 12);
                    
                    // Approximate normal
                    let nx = bx > sw/2 ? cos(a) : (bx < -sw/2 ? cos(a) : 0);
                    let ny = (bx > sw/2 || bx < -sw/2) ? sin(a) : (by > 0 ? 1 : -1);
                    
                    // Deflate shape slightly for shadow to create core mass look
                    if(isShadow) disp -= 4; 
                    
                    vertex(bx + nx * disp, by + ny * disp);
                }
                endShape(CLOSE);
                pop();
            }

            drawShadow() {
                this.drawShape(color(45, 95, 63, 60), 12, 18, true); // deep forest green shadow
            }

            draw() {
                // Trails
                if (this.hist.length > 2) {
                    noFill();
                    let velMag = this.v.mag();
                    let tAlpha = map(velMag, 0, 5, 10, 35);
                    stroke(red(this.col), green(this.col), blue(this.col), tAlpha);
                    strokeWeight(this.baseH * 0.7 * this.sc);
                    beginShape();
                    for (let pt of this.hist) vertex(pt.x, pt.y);
                    endShape();
                }
                this.drawShape(this.col);
            }
        }

        class Granule {
            constructor() {
                this.p = createVector(random(width), random(height));
                this.tgt = null;
                this.id = random(100);
            }

            update(ph, sFrames) {
                if (ph === 3 && simTime % 120000 > 75000) {
                    // Detach and drift
                    let dir = p5.Vector.sub(this.p, createVector(width / 2, height / 2)).normalize();
                    this.p.add(p5.Vector.mult(dir, 0.7 * sFrames));
                } else {
                    if (frameCount % 6 === 0) {
                        let md = 9999;
                        for (let c of caps) {
                            let d = dist(this.p.x, this.p.y, c.p.x, c.p.y);
                            if (d < md) { md = d; this.tgt = c; }
                        }
                    }
                    if (this.tgt) {
                        let dir = p5.Vector.sub(this.tgt.p, this.p);
                        let d = dir.mag();
                        // Snap to corona
                        if (d > (this.tgt.baseW/2 + 20)) {
                            this.p.add(dir.normalize().mult(3 * sFrames));
                        } else {
                            // Orbit slightly
                            let a = atan2(this.p.y - this.tgt.p.y, this.p.x - this.tgt.p.x);
                            a += (ph === 2 ? 0.035 : 0.01) * sFrames;
                            let r = this.tgt.baseH/2 + 15 + sin(simTime*0.005 + this.id)*10;
                            this.p.x = this.tgt.p.x + cos(a)*r;
                            this.p.y = this.tgt.p.y + sin(a)*r;
                        }
                    }
                }
            }

            draw() {
                fill(139, 90, 125, 180); // muted plum
                noStroke();
                beginShape();
                for(let i=0; i<6; i++) {
                    let a = i * TWO_PI/6 + this.id;
                    let r = 3 + noise(this.id, i, simTime*0.002)*3;
                    vertex(this.p.x + cos(a)*r, this.p.y + sin(a)*r);
                }
                endShape(CLOSE);
            }
        }
    </script>
</body>
</html>
